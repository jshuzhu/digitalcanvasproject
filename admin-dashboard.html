<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Admin • Simple is More</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins'], brand: ['Gloria Hallelujah'] } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans flex h-screen overflow-hidden">

  <aside class="w-64 bg-black text-white flex flex-col shrink-0">
    <div class="p-6 border-b border-gray-800">
      <h2 class="text-2xl font-bold font-brand">Admin Panel</h2>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <button onclick="switchTab('orders')" id="tab-orders" class="w-full text-left px-4 py-3 bg-gray-800 rounded-lg transition">📦 Urus Pesanan</button>
      <button onclick="switchTab('products')" id="tab-products" class="w-full text-left px-4 py-3 hover:bg-gray-800 rounded-lg transition">🏷️ Urus Produk</button>
      <button onclick="switchTab('banners')" id="tab-banners" class="w-full text-left px-4 py-3 hover:bg-gray-800 rounded-lg transition">🖼️ Urus Banner</button>
    </nav>
    <div class="p-4 border-t border-gray-800">
      <button onclick="logout()" class="w-full text-left px-4 py-2 text-red-400 hover:text-red-300 transition">🚪 Log Keluar</button>
    </div>
  </aside>


  <div id="profile-menu" class="hidden absolute right-0 mt-3 w-48 bg-white border border-gray-100 shadow-xl py-2 z-50">
    <a href="/profile" class="block px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black hover:bg-gray-50 transition-colors">My Profile</a>
    <a href="/orders" class="block px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black hover:bg-gray-50 transition-colors">My Orders</a>
    <hr class="my-1 border-gray-50">
    <button onclick="logout()" class="block w-full text-left px-4 py-2 text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-600 hover:bg-gray-50 transition-colors">Logout</button>
  </div>
</div>

  <main class="flex-1 overflow-y-auto p-8">
    
    <section id="section-orders" class="block">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Senarai Pesanan</h1>
        
        <div class="flex bg-white rounded-lg p-1 border shadow-sm">
          <button onclick="filterOrders('Processing')" id="flt-Processing" class="px-4 py-2 text-sm font-semibold rounded-md bg-gray-800 text-white transition">Processing</button>
          <button onclick="filterOrders('Shipped')" id="flt-Shipped" class="px-4 py-2 text-sm font-semibold rounded-md text-gray-600 hover:bg-gray-100 transition">Shipped</button>
          <button onclick="filterOrders('Delivered')" id="flt-Delivered" class="px-4 py-2 text-sm font-semibold rounded-md text-gray-600 hover:bg-gray-100 transition">Delivered</button>
        </div>
      </div>

      <div id="orders-container" class="space-y-6">
        <p class="text-gray-500 animate-pulse">Memuatkan pesanan...</p>
      </div>
    </section>

    <section id="section-products" class="hidden">
      <h1 class="text-3xl font-bold mb-6">Pengurusan Produk</h1>
      
      <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
        <h3 id="product-form-title" class="text-lg font-semibold mb-4 text-gray-700">Tambah Produk Baru</h3>
        <form id="product-form" onsubmit="saveProduct(event)" class="space-y-4">
          <input type="hidden" id="edit-product-id">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><input type="text" id="prod-id" required placeholder="ID (Cth: P005)" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></div>
            <div><input type="text" id="prod-name" required placeholder="Nama Produk" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></div>
            <div><input type="text" id="prod-category" required placeholder="Kategori" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></div>
            <div><input type="number" step="0.01" id="prod-price" required placeholder="Harga (RM)" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></div>
            <div><input type="number" id="prod-stock" required placeholder="Stok" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></div>
            <div><input type="text" id="prod-img" placeholder="URL Gambar" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></div>
          </div>
          <div><textarea id="prod-desc" rows="2" placeholder="Deskripsi Produk" class="border p-2.5 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black"></textarea></div>
          <div class="flex gap-2">
            <button type="submit" class="bg-black text-white px-6 py-2.5 rounded-lg hover:bg-gray-800 transition">Simpan Produk</button>
            <button type="button" onclick="resetProductForm()" id="btn-cancel-edit" class="bg-gray-200 text-gray-700 px-4 py-2.5 rounded-lg hidden transition">Batal</button>
          </div>
        </form>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-100 border-b text-gray-700 font-semibold text-sm">
              <th class="p-4">ID</th><th class="p-4">Nama</th><th class="p-4">Harga</th><th class="p-4">Stok</th><th class="p-4 text-center">Tindakan</th>
            </tr>
          </thead>
          <tbody id="products-table-body" class="divide-y text-sm"></tbody>
        </table>
      </div>
    </section>

    <section id="section-banners" class="hidden">
      <h1 class="text-3xl font-bold mb-6">Pengurusan Banner</h1>
      
      <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
        <h3 class="text-lg font-semibold mb-4 text-gray-700">Tambah Banner Baru</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <input type="text" id="banner-title" placeholder="Tajuk Banner (Cth: Koleksi Raya)" class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black">
          <input type="text" id="banner-subtitle" placeholder="Sub-tajuk (Cth: Diskaun 50%)" class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-black">
        </div>
        <div class="mb-4">
          <input type="file" id="banner-file" accept="image/*" class="border p-2 rounded-lg w-full">
        </div>
        <button onclick="uploadBanner()" id="btn-upload" class="bg-black text-white px-6 py-2 rounded-lg hover:bg-gray-800 transition">Upload Banner</button>
        <p id="upload-status" class="text-sm mt-2 text-blue-600 hidden">Sedang memuat naik...</p>
      </div>

      <h3 class="text-lg font-semibold mb-4">Banner Aktif</h3>
      <div id="banners-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>
    </section>

  </main>

  <script>
    // E-mel rasmi admin dimasukkan di sini
    const ADMIN_EMAIL = 'akmaladnan009@gmail.com';
    let allOrdersData = [];
    let currentOrderFilter = 'Processing';

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user || user.email !== ADMIN_EMAIL) {
        alert("Akses disekat! Hanya akaun admin dibenarkan.");
        window.location.href = '/login';
      } else {
        loadOrders();
        loadProducts();
        loadBanners(); // Pastikan banner diload
      }
    }

    function switchTab(tab) {
      document.getElementById('section-orders').classList.toggle('hidden', tab !== 'orders');
      document.getElementById('section-products').classList.toggle('hidden', tab !== 'products');
      document.getElementById('section-banners').classList.toggle('hidden', tab !== 'banners');
      
      document.getElementById('tab-orders').classList.toggle('bg-gray-800', tab === 'orders');
      document.getElementById('tab-products').classList.toggle('bg-gray-800', tab === 'products');
      document.getElementById('tab-banners').classList.toggle('bg-gray-800', tab === 'banners');
    }

    // --- 1. PENGURUSAN PESANAN ---
    async function loadOrders() {
      const { data: orders, error } = await supabase.from('orders').select('*, order_items(*)').order('created_at', { ascending: false });
      if (error) { alert("Ralat order: " + error.message); return; }
      
      allOrdersData = orders.map(o => {
        if(o.order_status === 'Pending') o.order_status = 'Processing';
        return o;
      });
      renderOrders();
    }

    function filterOrders(status) {
      currentOrderFilter = status;
      ['Processing', 'Shipped', 'Delivered'].forEach(s => {
        const btn = document.getElementById(`flt-${s}`);
        if(s === status) {
          btn.classList.add('bg-gray-800', 'text-white'); btn.classList.remove('text-gray-600', 'hover:bg-gray-100');
        } else {
          btn.classList.remove('bg-gray-800', 'text-white'); btn.classList.add('text-gray-600', 'hover:bg-gray-100');
        }
      });
      renderOrders();
    }

    function renderOrders() {
      const container = document.getElementById('orders-container');
      const filteredOrders = allOrdersData.filter(o => o.order_status === currentOrderFilter);

      if (filteredOrders.length === 0) {
        container.innerHTML = `<div class="bg-white p-8 text-center rounded-xl border border-gray-200"><p class="text-gray-500">Tiada pesanan dalam fasa <b>${currentOrderFilter}</b>.</p></div>`;
        return;
      }

      container.innerHTML = filteredOrders.map(o => {
        const address = `${o.address1}, ${o.address2 ? o.address2 + ', ' : ''}${o.postcode} ${o.city}, ${o.state}`;
        const itemsList = o.order_items.map(item => `<li class="flex justify-between border-b border-gray-100 py-1 text-sm"><span>${item.product_name}</span> <span class="font-bold">x${item.qty}</span></li>`).join('');
        
        let logisticsUI = '';
        if (currentOrderFilter === 'Processing') {
          logisticsUI = `
            <div class="mt-4 bg-yellow-50 p-4 rounded-lg border border-yellow-200">
              <p class="text-xs font-bold text-yellow-800 uppercase tracking-wide mb-2">Tindakan: Masukkan Maklumat Pos</p>
              <div class="flex gap-2">
                <input type="text" id="track-${o.order_id}" placeholder="No Tracking" class="flex-1 border border-yellow-300 p-2 rounded text-sm focus:outline-none">
                <input type="text" id="courier-${o.order_id}" placeholder="Kurier" class="w-1/3 border border-yellow-300 p-2 rounded text-sm focus:outline-none">
                <button onclick="markAsShipped('${o.order_id}')" class="bg-black text-white px-4 py-2 rounded text-sm hover:bg-gray-800 shadow">Tandakan Shipped</button>
              </div>
            </div>`;
        } else if (currentOrderFilter === 'Shipped') {
          logisticsUI = `
            <div class="mt-4 bg-blue-50 p-4 rounded-lg border border-blue-200 flex justify-between items-center">
              <div>
                <p class="text-xs font-bold text-blue-800 uppercase tracking-wide">Status Penghantaran</p>
                <p class="text-sm">Tracking: <span class="font-semibold">${o.tracking_no}</span> (${o.courier})</p>
              </div>
              <button onclick="markAsDelivered('${o.order_id}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 shadow-sm">Tandakan Delivered</button>
            </div>`;
        } else if (currentOrderFilter === 'Delivered') {
          logisticsUI = `
            <div class="mt-4 bg-green-50 p-4 rounded-lg border border-green-200">
              <p class="text-sm text-green-800 font-semibold">✓ Pesanan telah selesai dan diterima oleh pelanggan.</p>
              <p class="text-xs text-green-600">Pelanggan kini boleh meninggalkan ulasan produk di laman web.</p>
            </div>`;
        }

        return `
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-6">
            <div class="flex-1">
              <div class="flex justify-between items-start mb-2">
                <h3 class="font-bold text-lg">${o.order_id}</h3>
                <span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded">${o.payment_status}</span>
              </div>
              <p class="text-xs text-gray-400 mb-4">${new Date(o.created_at).toLocaleString('ms-MY')}</p>
              <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Item Dipesan</p>
                <ul class="mb-3">${itemsList}</ul>
                <div class="flex justify-between font-bold border-t border-gray-200 pt-2 text-sm"><span>Total Harga:</span><span>RM ${parseFloat(o.total_amount).toFixed(2)}</span></div>
              </div>
            </div>
            
            <div class="flex-1 flex flex-col justify-between">
              <div>
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Alamat Pelanggan</p>
                <p class="text-sm font-semibold">${o.email}</p>
                <p class="text-sm text-gray-600 leading-relaxed">${address}</p>
              </div>
              ${logisticsUI}
            </div>
          </div>`;
      }).join('');
    }

    async function markAsShipped(orderId) {
      const tracking = document.getElementById(`track-${orderId}`).value.trim();
      const courier = document.getElementById(`courier-${orderId}`).value.trim();
      if(!tracking || !courier) { alert("Sila isi Tracking No & Kurier!"); return; }

      await supabase.from('orders').update({ tracking_no: tracking, courier: courier, order_status: 'Shipped' }).eq('order_id', orderId);
      alert("Pesanan berjaya dipindahkan ke fasa SHIPPED.");
      loadOrders();
    }

    async function markAsDelivered(orderId) {
      if(confirm("Adakah pelanggan telah mengesahkan penerimaan barang?")) {
        await supabase.from('orders').update({ order_status: 'Delivered' }).eq('order_id', orderId);
        alert("Pesanan selesai! Pelanggan kini boleh meninggalkan ulasan.");
        loadOrders();
      }
    }

    // --- 2. PENGURUSAN PRODUK ---
    async function loadProducts() {
      const { data: products } = await supabase.from('products').select('*').order('created_at', { ascending: false });
      const tbody = document.getElementById('products-table-body');
      
      tbody.innerHTML = products.map(p => {
        const stockWarning = p.stock <= 5 ? `<span class="text-red-600 font-bold bg-red-50 px-2 py-1 rounded border border-red-200">⚠️ ${p.stock} (Low)</span>` : `<span class="text-gray-700">${p.stock}</span>`;
        return `
        <tr class="hover:bg-gray-50">
          <td class="p-4 font-mono font-semibold">${p.product_id}</td>
          <td class="p-4 font-medium">${p.name}</td>
          <td class="p-4 font-bold">RM ${parseFloat(p.price).toFixed(2)}</td>
          <td class="p-4">${stockWarning}</td>
          <td class="p-4 text-center space-x-2">
            <button onclick="editProduct('${p.product_id}', '${p.name}', '${p.category}', ${p.price}, ${p.stock}, '${p.image_url}', '${p.description || ''}')" class="text-blue-600 border border-blue-600 px-2.5 py-1 rounded-md hover:bg-blue-50 text-xs transition">Edit</button>
            <button onclick="deleteProduct('${p.product_id}')" class="text-red-600 border border-red-600 px-2.5 py-1 rounded-md hover:bg-red-50 text-xs transition">Hapus</button>
          </td>
        </tr>`;
      }).join('');
    }

    async function saveProduct(e) {
      e.preventDefault();
      const isEdit = document.getElementById('edit-product-id').value !== "";
      const productData = {
        product_id: document.getElementById('prod-id').value.trim(),
        name: document.getElementById('prod-name').value.trim(),
        category: document.getElementById('prod-category').value.trim(),
        price: parseFloat(document.getElementById('prod-price').value),
        stock: parseInt(document.getElementById('prod-stock').value),
        image_url: document.getElementById('prod-img').value.trim() || null,
        description: document.getElementById('prod-desc').value.trim() || null,
        status: 'Active'
      };

      let error;
      if (isEdit) {
        const res = await supabase.from('products').update(productData).eq('product_id', productData.product_id);
        error = res.error;
      } else {
        const res = await supabase.from('products').insert([productData]);
        error = res.error;
      }

      if (error) alert("Gagal menyimpan produk: " + error.message);
      else { alert(isEdit ? "Produk dikemaskini!" : "Produk baru ditambah!"); resetProductForm(); loadProducts(); }
    }

    function editProduct(id, name, cat, price, stock, img, desc) {
      document.getElementById('product-form-title').innerText = `Kemaskini Produk: ${id}`;
      document.getElementById('edit-product-id').value = id;
      document.getElementById('prod-id').value = id;
      document.getElementById('prod-id').disabled = true;
      document.getElementById('prod-name').value = name;
      document.getElementById('prod-category').value = cat;
      document.getElementById('prod-price').value = price;
      document.getElementById('prod-stock').value = stock;
      document.getElementById('prod-img').value = img === "null" ? "" : img;
      document.getElementById('prod-desc').value = desc === "null" ? "" : desc;
      document.getElementById('btn-cancel-edit').classList.remove('hidden');
    }

    async function deleteProduct(productId) {
      if (confirm(`Adakah anda pasti mahu memadam produk ${productId}?`)) {
        await supabase.from('products').delete().eq('product_id', productId);
        loadProducts();
      }
    }

    function resetProductForm() {
      document.getElementById('product-form-title').innerText = "Tambah Produk Baru";
      document.getElementById('edit-product-id').value = "";
      document.getElementById('prod-id').disabled = false;
      document.getElementById('product-form').reset();
      document.getElementById('btn-cancel-edit').classList.add('hidden');
    }

    // --- 3. PENGURUSAN BANNER ---
    async function loadBanners() {
      const { data } = await supabase.from('banners').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('banners-container');
      if (data) {
        container.innerHTML = data.map(b => `
          <div class="bg-white rounded-xl shadow-sm border overflow-hidden relative group">
            <div class="h-40 bg-cover bg-center" style="background-image: url('${b.image_url}')"></div>
            <div class="p-4 flex justify-between items-end">
              <div>
                <h4 class="font-bold">${b.title || 'Tiada Tajuk'}</h4>
                <p class="text-sm text-gray-500">${b.subtitle || '-'}</p>
              </div>
              <button onclick="deleteBanner('${b.banner_id}')" class="text-red-500 text-sm border border-red-500 px-3 py-1 rounded hover:bg-red-50 transition">Padam</button>
            </div>
          </div>`).join('');
      }
    }

    // Contoh fungsi upload banner yang robust
async function uploadBanner(file, title, subtitle) {
  const fileExt = file.name.split('.').pop();
  const fileName = `banner-${Date.now()}.${fileExt}`;
  
  // 1. Upload ke Storage
  const { data: uploadData, error: uploadError } = await supabase.storage
    .from('banners') // Pastikan nama bucket betul
    .upload(fileName, file);

  if (uploadError) {
    console.error("Upload error:", uploadError);
    return;
  }

  // 2. Dapatkan URL
  const { data: { publicUrl } } = supabase.storage.from('banners').getPublicUrl(fileName);

  // 3. Masukkan ke Database
  const { error: dbError } = await supabase.from('banners').insert([{
    banner_id: `BAN-${Math.floor(1000+Math.random()*9000)}`,
    title: title,
    subtitle: subtitle,
    image_url: publicUrl,
    active: 1
  }]);

  if (dbError) {
    console.error("Database error:", dbError);
  } else {
    alert("Berjaya upload!");
  }
}

    async function deleteBanner(bannerId) {
      if(confirm("Padam banner ini?")) { 
        await supabase.from('banners').delete().eq('banner_id', bannerId); 
        loadBanners(); 
      }
    }

    // --- LOGOUT ---
    async function logout() { await supabase.auth.signOut(); window.location.href = '/login'; }

    
    checkAuth();
  </script>
</body>
</html>
