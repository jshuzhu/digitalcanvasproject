<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Cart • DigitalCanvasMy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="nav.js" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { black: '#111111', white: '#ffffff', gray: { 50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7' } },
          animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out forwards', 'slide-up': 'slideUp 0.3s ease-out forwards' },
          keyframes: {
            fadeInUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(100%)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-black antialiased font-sans selection:bg-black selection:text-white pb-20">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/shop" class="flex items-center gap-3 group">
        <img src="https://lh3.googleusercontent.com/d/1yrX1qZ5CHJPZKnsYfGCT7ECJB52s6Esz" alt="DigitalCanvas Logo" class="h-8 md:h-10 w-auto object-contain transition-transform duration-500 group-hover:scale-105">
        <span class="text-xl font-bold tracking-tight hidden sm:block">DigitalCanvasMy</span>
      </a>
      <div class="flex items-center space-x-5 md:space-x-8 text-sm font-medium">
        <a href="/shop" class="text-gray-500 hover:text-black transition-colors relative group">
          <span>Shop</span><span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black transition-all group-hover:w-full"></span>
        </a>
        <a href="/orders" class="text-gray-500 hover:text-black transition-colors relative group">
          <span>My Orders</span><span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black transition-all group-hover:w-full"></span>
        </a>
        <a href="/cart" class="relative group flex items-center gap-1.5">
          <span>Cart</span>
          <span id="nav-cart-count" class="bg-black text-white px-2 py-0.5 rounded-full text-xs font-bold">0</span>
          <span class="absolute -bottom-1 left-0 w-full h-0.5 bg-black"></span>
        </a>
        
        <div class="relative">
          <button
            id="nav-avatar-btn"
            onclick="toggleProfileMenu(event)"
            class="focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 rounded-full"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Open profile menu"
          >
            <img
              id="nav-avatar"
              src="https://drive.google.com/uc?export=view&id=1zW2AVaMEXwfeSppqKUr5ScEXmT8qf26A"
              alt="Profile"
              class="w-9 h-9 rounded-full border border-gray-200 object-cover cursor-pointer hover:border-black transition-colors"
            >
          </button>
        
          <div
            id="profile-menu"
            class="hidden absolute right-0 mt-3 w-48 bg-white border border-gray-100 shadow-xl py-2 z-50"
            role="menu"
          >
            <a
              href="/profile.html"
              class="flex items-center gap-2 px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Update Profile
            </a>
        
            <hr class="my-1 border-gray-100">
        
            <button
              onclick="signOut()"
              class="flex items-center gap-2 w-full text-left px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-600 hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 mt-12 opacity-0 animate-fade-in-up">
    <div class="flex justify-between items-end mb-10 border-b border-gray-100 pb-4">
      <h1 class="text-3xl font-bold tracking-tight">Your Cart</h1>
      <a href="/shop" class="text-sm text-gray-400 hover:text-black transition-colors border-b border-transparent hover:border-black pb-1">Continue Shopping</a>
    </div>
    <div id="cart-container" class="space-y-8"></div>
  </main>

  <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'bg-black text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl animate-slide-up flex items-center gap-2';
      toast.innerHTML = `<span>✓</span> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function renderCart() {
      const container = document.getElementById('cart-container');
      document.getElementById('nav-cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center py-20 bg-gray-50 border border-gray-100">
            <p class="text-gray-400 uppercase tracking-widest text-sm mb-6">Your cart is empty.</p>
            <a href="/shop" class="inline-block bg-black text-white px-8 py-3 text-sm font-bold uppercase tracking-widest hover:bg-gray-800 transition-colors">Start Shopping</a>
          </div>`;
        return;
      }

      let html = `<div class="divide-y divide-gray-100 border-t border-b border-gray-100 mb-8">`;
      let grandTotal = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        grandTotal += itemTotal;
        html += `
          <div class="py-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex-1">
              <a href="/product?id=${item.id}" class="text-lg font-medium hover:underline underline-offset-4">${item.name}</a>
              <p class="text-sm text-gray-500 mt-1">RM ${parseFloat(item.price).toFixed(2)} each</p>
            </div>
            <div class="flex items-center gap-6">
              <div class="flex items-center border border-gray-200 bg-white">
                <button onclick="updateQty(${index}, -1)" class="px-3 py-1 text-gray-500 hover:text-black transition-colors">−</button>
                <span class="px-4 py-1 text-sm font-bold min-w-[2.5rem] text-center">${item.qty}</span>
                <button onclick="updateQty(${index}, 1)" class="px-3 py-1 text-gray-500 hover:text-black transition-colors">+</button>
              </div>
              <div class="w-24 text-right">
                <span class="font-bold text-lg">RM ${itemTotal.toFixed(2)}</span>
              </div>
              <button onclick="removeItem(${index})" class="text-gray-300 hover:text-red-500 transition-colors" title="Remove">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
              </button>
            </div>
          </div>`;
      });

      html += `</div>
        <div class="flex flex-col items-end">
          <div class="w-full sm:w-1/2 md:w-1/3 bg-gray-50 p-6 border border-gray-100">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm uppercase tracking-widest text-gray-500">Subtotal</span>
              <span class="font-bold text-xl">RM ${grandTotal.toFixed(2)}</span>
            </div>
            <p class="text-xs text-gray-400 mb-6 italic">Shipping calculated at checkout.</p>
            <button onclick="proceedToCheckout()" class="w-full bg-black text-white py-4 font-bold uppercase tracking-widest text-sm hover:bg-gray-800 transition-all">
              Check Out
            </button>
          </div>
        </div>`;

      container.innerHTML = html;
    }

    function updateQty(index, delta) {
      const newQty = cart[index].qty + delta;
      if (newQty > 0) { cart[index].qty = newQty; }
      else { cart.splice(index, 1); showToast('Item removed'); }
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      showToast('Item removed from cart');
    }

    function proceedToCheckout() {
      if (!cart.length) { showToast('Your cart is empty!'); return; }
      window.location.href = '/checkout';
    }

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = '/login-page.html'; return; }
      renderCart();
    }

    // Fungsi Asal
    async function logout() { await supabase.auth.signOut(); window.location.href = '/login-page.html'; }

    // Fungsi Baru
    async function signOut() {
      await supabase.auth.signOut();
      window.location.href = '/login-page.html';
    }

    checkAuth();
  </script>
</body>
</html>
