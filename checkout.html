<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout • DigitalCanvasMy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="nav.js" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { black: '#111111', white: '#ffffff', gray: { 50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7' } },
          animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out forwards', 'slide-up': 'slideUp 0.3s ease-out forwards' },
          keyframes: {
            fadeInUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(100%)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>
<base target="_blank">
</head>
<body class="bg-gray-50 text-black antialiased font-sans selection:bg-black selection:text-white pb-20">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/shop" class="flex items-center gap-3 group">
        <img src="https://lh3.googleusercontent.com/d/1yrX1qZ5CHJPZKnsYfGCT7ECJB52s6Esz" alt="DigitalCanvas Logo" class="h-8 md:h-10 w-auto object-contain transition-transform duration-500 group-hover:scale-105">
        <span class="text-xl font-bold tracking-tight hidden sm:block">DigitalCanvasMy</span>
      </a>
      <div class="flex items-center space-x-5 text-sm font-medium">
        <a href="/cart" class="text-gray-500 hover:text-black transition-colors">← Back to Cart</a>
        
        <div class="relative">
          <button
            id="nav-avatar-btn"
            onclick="toggleProfileMenu(event)"
            class="focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 rounded-full"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Open profile menu"
          >
            <img
              id="nav-avatar"
              src="https://drive.google.com/uc?export=view&id=1zW2AVaMEXwfeSppqKUr5ScEXmT8qf26A"
              alt="Profile"
              class="w-9 h-9 rounded-full border border-gray-200 object-cover cursor-pointer hover:border-black transition-colors"
            >
          </button>
        
          <div
            id="profile-menu"
            class="hidden absolute right-0 mt-3 w-48 bg-white border border-gray-100 shadow-xl py-2 z-50"
            role="menu"
          >
            <a
              href="/profile.html"
              class="flex items-center gap-2 px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Update Profile
            </a>
        
            <hr class="my-1 border-gray-100">
        
            <button
              onclick="signOut()"
              class="flex items-center gap-2 w-full text-left px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-600 hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>

      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 mt-8 md:mt-12 opacity-0 animate-fade-in-up flex flex-col lg:flex-row gap-10">

    <div class="w-full lg:w-2/3">
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-bold tracking-tight">Shipping Information</h1>
        <button id="btn-autofill" onclick="autoFillFromProfile()" class="hidden text-xs font-bold uppercase tracking-widest border-b border-black pb-0.5 hover:text-gray-500 transition-colors">
          Use Saved Address
        </button>
      </div>

      <form id="checkout-form" onsubmit="processCheckout(event)" class="bg-white p-6 md:p-8 border border-gray-100 shadow-sm space-y-6">

        <div>
          <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Contact Details</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Full Name</label>
              <input type="text" id="cust-name" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Phone Number</label>
              <input type="tel" id="cust-phone" required placeholder="0123456789" class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs font-semibold text-gray-500 mb-1">Email Address</label>
<input type="email" id="cust-email" required readonly class="... bg-gray-50 cursor-not-allowed">            </div>
          </div>
        </div>

        <div class="pt-4 border-t border-gray-100">
          <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Delivery Address</h2>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Address Line 1</label>
              <input type="text" id="addr-1" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Address Line 2 (Optional)</label>
              <input type="text" id="addr-2" class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">City</label>
                <input type="text" id="addr-city" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Postcode</label>
                <input type="text" id="addr-postcode" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">State</label>
              <select id="addr-state" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black transition-colors bg-transparent">
                <option value="">Select State...</option>
                <option value="Johor">Johor</option>
                <option value="Kedah">Kedah</option>
                <option value="Kelantan">Kelantan</option>
                <option value="Melaka">Melaka</option>
                <option value="Negeri Sembilan">Negeri Sembilan</option>
                <option value="Pahang">Pahang</option>
                <option value="Perak">Perak</option>
                <option value="Perlis">Perlis</option>
                <option value="Pulau Pinang">Pulau Pinang</option>
                <option value="Sabah">Sabah</option>
                <option value="Sarawak">Sarawak</option>
                <option value="Selangor">Selangor</option>
                <option value="Terengganu">Terengganu</option>
                <option value="W.P. Kuala Lumpur">W.P. Kuala Lumpur</option>
                <option value="W.P. Labuan">W.P. Labuan</option>
                <option value="W.P. Putrajaya">W.P. Putrajaya</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" id="btn-pay" class="w-full bg-black text-white py-4 mt-6 font-bold uppercase tracking-widest text-sm hover:bg-gray-800 transition-all shadow-md">
          Proceed to Payment
        </button>
      </form>
    </div>

    <div class="w-full lg:w-1/3">
      <div class="bg-white p-6 border border-gray-100 shadow-sm sticky top-24">
        <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6">Order Summary</h2>
        <div id="checkout-items" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2"></div>
        <div class="border-t border-gray-100 pt-4 space-y-3">
          <div class="flex justify-between text-sm text-gray-500">
            <span>Subtotal</span>
            <span id="summary-subtotal" class="font-medium">RM 0.00</span>
          </div>
          <div class="flex justify-between text-sm text-gray-500">
            <span>Shipping</span>
            <span id="summary-shipping" class="font-medium">RM 8.00</span>
          </div>
          <div class="flex justify-between text-lg font-bold border-t border-gray-100 pt-3 mt-3">
            <span>Total</span>
            <span id="summary-total">RM 0.00</span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const SHIPPING_FEE = 8.00;
    let grandTotal = 0;

    window.addEventListener('DOMContentLoaded', () => {
      if (cart.length > 0) {
        renderOrderSummary();
      } else {
        window.location.href = '/cart';
      }
    });

    let userEmail = '';
    let savedProfile = null;

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'bg-black text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl animate-slide-up flex items-center gap-2';
      toast.innerHTML = `<span>✓</span> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

 async function checkAuth() {
  if (typeof supabase === 'undefined') return;

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { 
    window.location.href = 'login-page.html'; 
    return; 
  }
  
  // ISI VARIABLE GLOBAL DI SINI
  userEmail = user.email; 
  
  // Isi juga ke dalam input box supaya user nampak email mereka
  const emailInput = document.getElementById('cust-email');
  if (emailInput) {
    emailInput.value = user.email;
  }
  
  renderOrderSummary(); // Panggil ini selepas auth selesai
}
    function autoFillFromProfile() {
      if (!savedProfile) return;
      document.getElementById('cust-name').value = savedProfile.full_name || '';
      document.getElementById('cust-phone').value = savedProfile.phone || '';
      document.getElementById('addr-1').value = savedProfile.address_line1 || '';
      document.getElementById('addr-2').value = savedProfile.address_line2 || '';
      document.getElementById('addr-city').value = savedProfile.city || '';
      document.getElementById('addr-postcode').value = savedProfile.postcode || '';
      document.getElementById('addr-state').value = savedProfile.state || '';
      showToast('Address loaded from profile');
    }

    function renderOrderSummary() {
      const container = document.getElementById('checkout-items');
      let subtotal = 0;
      container.innerHTML = cart.map(item => {
        const itemTotal = item.price * item.qty;
        subtotal += itemTotal;
        return `
          <div class="flex justify-between items-start text-sm">
            <div class="flex-1 pr-4">
              <p class="font-medium line-clamp-1">${item.name}</p>
              <p class="text-gray-400 text-xs mt-0.5">Qty: ${item.qty}</p>
            </div>
            <span class="font-medium whitespace-nowrap">RM ${itemTotal.toFixed(2)}</span>
          </div>`;
      }).join('');
      grandTotal = subtotal + SHIPPING_FEE;
      document.getElementById('summary-subtotal').innerText = `RM ${subtotal.toFixed(2)}`;
      document.getElementById('summary-shipping').innerText = `RM ${SHIPPING_FEE.toFixed(2)}`;
      document.getElementById('summary-total').innerText = `RM ${grandTotal.toFixed(2)}`;
    }

  async function processCheckout(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-pay');
  btn.disabled = true;
  btn.innerText = 'Processing...';

  try {
    // 1. Validasi Input Awal
    const name = document.getElementById('cust-name')?.value.trim();
    const phone = document.getElementById('cust-phone')?.value.trim();
    const email = document.getElementById('cust-email')?.value.trim();
    if (!name || !phone || !email) {
      throw new Error("Sila pastikan Nama, Telefon, dan Email diisi.");
    }

    const orderId = 'ORD-' + Math.floor(Date.now() / 1000);

    // 2. Simpan Order Header ke Database
    const { error: orderError } = await supabase.from('orders').insert([{
      order_id: orderId,
      email: userEmail,
      total_amount: Number(grandTotal),
      payment_status: 'Pending',
      order_status: 'Processing',
      address1: document.getElementById('addr-1')?.value.trim() || '',
      address2: document.getElementById('addr-2')?.value.trim() || '',
      city: document.getElementById('addr-city')?.value.trim() || '',
      postcode: document.getElementById('addr-postcode')?.value.trim() || '',
      state: document.getElementById('addr-state')?.value || ''
    }]);

    if (orderError) throw new Error("Gagal simpan order: " + orderError.message);

    // 3. Simpan Order Items (Hanya sekali sahaja)
    const orderItems = cart.map(item => ({ 
      order_id: orderId, 
      product_id: item.id, 
      product_name: item.name, 
      qty: Number(item.qty), 
      price: Number(item.price) 
    }));
    

    const { error: itemsError } = await supabase.from('order_items').insert(orderItems);
    if (itemsError) throw new Error("Gagal simpan items: " + itemsError.message);

// 4. Panggil API ToyyibPay
    // Dapatkan session dan token dengan betul
    const { data: { session } } = await supabase.auth.getSession();
    const token = session?.access_token; // <--- INI PENTING: Kita define kat sini

    if (!token) {
        throw new Error("Sesi tamat. Sila login semula.");
    }

    // Tukar amount kepada sen (RM17.00 -> 1700)
    const amountInCents = Math.round(Number(grandTotal) * 100);

    const response = await fetch('https://sbwuivanwcllgzhwupcq.supabase.co/functions/v1/create-toyyibpay-bill-api', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}` // Token dah ada, error reference akan hilang
      },
      body: JSON.stringify({
        order_id: orderId,
        amount: amountInCents, // Hantar dalam sen (1700)
        name: name,
        email: email,
        phone: phone
      })
    });

    const result = await response.json();
    
    if (!response.ok) throw new Error(result.error || 'API ToyyibPay gagal');

    // 5. Redirect ke ToyyibPay
    localStorage.removeItem('cart');
    window.location.href = `https://toyyibpay.com/${result.billCode}`;

  } catch (err) {
    console.error("Checkout Error:", err);
    showToast(err.message, true);
    btn.disabled = false;
    btn.innerText = 'Proceed to Payment';
  }
}

    // ...

    async function logout() { await supabase.auth.signOut(); window.location.href = '/index.html'; }

    async function signOut() {
      await supabase.auth.signOut();
      window.location.href = '/index.html';
    }

    checkAuth();
  </script>
</body>
</html>
