<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Orders • DigitalCanvasMy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="nav.js" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { black: '#111111', white: '#ffffff', gray: { 50: '#fafafa', 100: '#f4f4f5', 500: '#71717a' } },
          animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out forwards', 'slide-up': 'slideUp 0.3s ease-out forwards' },
          keyframes: {
            fadeInUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(100%)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-black antialiased font-sans selection:bg-black selection:text-white pb-20">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/shop" class="flex items-center gap-3 group">
        <img src="https://lh3.googleusercontent.com/d/1yrX1qZ5CHJPZKnsYfGCT7ECJB52s6Esz" alt="DigitalCanvas Logo" class="h-8 md:h-10 w-auto object-contain transition-transform duration-500 group-hover:scale-105">
        <span class="text-xl font-bold tracking-tight hidden sm:block">DigitalCanvasMy</span>
      </a>
      <div class="flex items-center space-x-5 md:space-x-8 text-sm font-medium">
        <a href="/shop" class="text-gray-500 hover:text-black transition-colors relative group">
          <span>Shop</span><span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black transition-all group-hover:w-full"></span>
        </a>
        <a href="/cart" class="text-gray-500 hover:text-black transition-colors">Cart</a>
        
        <div class="relative">
          <button
            id="nav-avatar-btn"
            onclick="toggleProfileMenu(event)"
            class="focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 rounded-full"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Open profile menu"
          >
            <img
              id="nav-avatar"
              src="https://drive.google.com/uc?export=view&id=1zW2AVaMEXwfeSppqKUr5ScEXmT8qf26A"
              alt="Profile"
              class="w-9 h-9 rounded-full border border-gray-200 object-cover cursor-pointer hover:border-black transition-colors"
            >
          </button>
        
          <div
            id="profile-menu"
            class="hidden absolute right-0 mt-3 w-48 bg-white border border-gray-100 shadow-xl py-2 z-50"
            role="menu"
          >
            <a
              href="/profile.html"
              class="flex items-center gap-2 px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Update Profile
            </a>
        
            <hr class="my-1 border-gray-100">
        
            <button
              onclick="signOut()"
              class="flex items-center gap-2 w-full text-left px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-600 hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 mt-12 opacity-0 animate-fade-in-up">
    <h1 class="text-3xl font-bold tracking-tight mb-2">My Orders</h1>
    <p class="text-gray-500 mb-10 text-sm">Track your shipments and leave a review once received.</p>
    <div id="my-orders-container" class="space-y-8">
      <p class="text-center text-gray-400 py-10 animate-pulse">Loading orders...</p>
    </div>
  </main>

  <div id="review-modal" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center hidden z-50 px-4">
    <div class="bg-white border border-gray-100 shadow-2xl w-full max-w-sm p-8 relative">
      <h3 class="text-lg font-bold uppercase tracking-widest mb-6">Write a Review</h3>
      <p id="review-product-name" class="text-xs text-gray-400 mb-6 font-bold uppercase tracking-widest"></p>
      <form onsubmit="submitReview(event)" class="space-y-6">
        <input type="hidden" id="review-product-id">
        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Rating</label>
          <select id="review-rating" class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black bg-transparent">
            <option value="5">★★★★★ Excellent</option>
            <option value="4">★★★★ Good</option>
            <option value="3">★★★ Average</option>
            <option value="2">★★ Poor</option>
            <option value="1">★ Terrible</option>
          </select>
        </div>
        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Comment</label>
          <textarea id="review-comment" rows="3" required placeholder="Share your experience..." class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-black bg-transparent"></textarea>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeReviewModal()" class="flex-1 py-3 text-sm font-bold uppercase tracking-widest text-gray-400 hover:text-black">Cancel</button>
          <button type="submit" class="flex-1 bg-black text-white py-3 font-bold uppercase tracking-widest text-sm hover:bg-gray-800">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    let userEmail = null;

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'bg-black text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl animate-slide-up flex items-center gap-2';
      toast.innerHTML = `<span>✓</span> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = '/login'; return; }
      userEmail = user.email;
      loadMyOrders();
      setTimeout(() => document.querySelector('main').classList.remove('opacity-0'), 50);
    }

    async function loadMyOrders() {
      const { data: orders } = await supabase.from('orders').select('*, order_items(*)').eq('email', userEmail).order('created_at', { ascending: false });
      const container = document.getElementById('my-orders-container');

      if (!orders || orders.length === 0) {
        container.innerHTML = `
          <div class="text-center py-20 border-2 border-black bg-white">
            <p class="text-black font-bold uppercase tracking-widest text-sm mb-8">You don't have any orders yet.</p>
            <a href="/shop" class="inline-block border-2 border-black px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all">Start Shopping</a>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(o => {
        const isDelivered = o.order_status === 'Delivered';
        const itemsList = o.order_items.map(item => {
          const reviewBtn = isDelivered
            ? `<button onclick="openReviewModal('${item.product_id}', '${item.product_name.replace(/'/g, "\\'")}')" class="text-[10px] font-bold uppercase tracking-widest border-b border-black hover:text-gray-500">Review</button>`
            : '';
          return `<div class="flex justify-between items-center py-3 border-b border-gray-50 last:border-0"><span class="text-sm">${item.product_name}</span>${reviewBtn}</div>`;
        }).join('');

        const statusColor = isDelivered ? 'text-black' : 'text-gray-400';
        return `
          <div class="border border-gray-100 p-6">
            <div class="flex justify-between items-center mb-6">
              <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${new Date(o.created_at).toLocaleDateString('en-GB')}</span>
              <span class="text-[10px] font-bold uppercase tracking-widest ${statusColor}">${o.order_status}</span>
            </div>
            <div class="mb-6">${itemsList}</div>
            <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-50">
              <span class="text-xs text-gray-400">Total: <span class="font-bold text-black">RM ${parseFloat(o.total_amount).toFixed(2)}</span></span>
              ${o.tracking_no ? `<p class="text-xs text-gray-500">Tracking: <span class="font-bold text-black">${o.tracking_no} (${o.courier})</span></p>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function openReviewModal(pid, name) {
      document.getElementById('review-product-id').value = pid;
      document.getElementById('review-product-name').innerText = name;
      document.getElementById('review-modal').classList.remove('hidden');
    }

    function closeReviewModal() { document.getElementById('review-modal').classList.add('hidden'); }

    async function submitReview(e) {
      e.preventDefault();
      const { error } = await supabase.from('reviews').insert([{
        product_id: document.getElementById('review-product-id').value,
        email: userEmail,
        rating: parseInt(document.getElementById('review-rating').value),
        comment: document.getElementById('review-comment').value.trim()
      }]);
      if (!error) { showToast('Review submitted!'); closeReviewModal(); }
      else { showToast('Error submitting review.'); }
    }

    async function logout() { await supabase.auth.signOut(); window.location.href = '/login'; }

    // FUNGSI BARU DARI CLAUDE
    async function signOut() {
      await supabase.auth.signOut();
      window.location.href = '/login';
    }

    checkAuth();
  </script>
</body>
</html>
