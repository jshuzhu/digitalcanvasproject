<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop • DigitalCanvasMy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="nav.js" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { black: '#111111', white: '#ffffff', gray: { 50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7', 900: '#18181b' } },
          animation: { 'fade-in-up': 'fadeInUp 0.6s ease-out forwards', 'slide-up': 'slideUp 0.3s ease-out forwards' },
          keyframes: {
            fadeInUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(100%)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-black antialiased font-sans selection:bg-black selection:text-white">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">

      <a href="/shop" class="flex items-center gap-3 group">
        <img src="https://lh3.googleusercontent.com/d/1yrX1qZ5CHJPZKnsYfGCT7ECJB52s6Esz" alt="DigitalCanvas Logo" class="h-8 md:h-10 w-auto object-contain transition-transform duration-500 group-hover:scale-105">
        <span class="text-xl font-bold tracking-tight hidden sm:block">DigitalCanvasMy</span>
      </a>

      <div class="flex items-center space-x-5 md:space-x-8 text-sm font-medium">
        <a href="/shop" class="relative group">
          <span>Shop</span>
          <span class="absolute -bottom-1 left-0 w-full h-0.5 bg-black scale-x-100"></span>
        </a>

        <a href="/orders" class="text-gray-500 hover:text-black transition-colors relative group">
          <span>My Orders</span>
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-black transition-all group-hover:w-full"></span>
        </a>

        <a href="/cart" class="text-gray-500 hover:text-black transition-colors flex items-center gap-1.5 group">
          <span>Cart</span>
          <span id="cart-count" class="bg-gray-100 text-black px-2 py-0.5 rounded-full text-xs font-bold transition-colors group-hover:bg-black group-hover:text-white">0</span>
        </a>

        <div class="relative">
          <button
            id="nav-avatar-btn"
            onclick="toggleProfileMenu(event)"
            class="focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 rounded-full"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Open profile menu"
          >
            <img
              id="nav-avatar"
              src="https://drive.google.com/uc?export=view&id=1zW2AVaMEXwfeSppqKUr5ScEXmT8qf26A"
              alt="Profile"
              class="w-9 h-9 rounded-full border border-gray-200 object-cover cursor-pointer hover:border-black transition-colors"
            >
          </button>
        
          <div
            id="profile-menu"
            class="hidden absolute right-0 mt-3 w-48 bg-white border border-gray-100 shadow-xl py-2 z-50"
            role="menu"
          >
            <a
              href="/profile.html"
              class="flex items-center gap-2 px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Update Profile
            </a>
        
            <hr class="my-1 border-gray-100">
        
            <button
              onclick="signOut()"
              class="flex items-center gap-2 w-full text-left px-4 py-2.5 text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-600 hover:bg-gray-50 transition-colors"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <header class="max-w-6xl mx-auto px-4 py-16 md:py-24 animate-fade-in-up">
    <div class="max-w-2xl">
      <h1 class="text-5xl md:text-6xl font-bold tracking-tighter leading-tight mb-4">
        Lukis guna<br/>empat kaki.
      </h1>
      <p class="text-lg text-gray-500 font-light tracking-wide">
        Ikhlas dari kaki,<br/>ke tangan anda.
      </p>
    </div>
  </header>

  <section id="banner-section" class="max-w-6xl mx-auto px-4 mb-16 hidden opacity-0 animate-fade-in-up" style="animation-delay: 0.2s;"></section>

  <main class="max-w-6xl mx-auto px-4 pb-24 opacity-0 animate-fade-in-up" style="animation-delay: 0.3s;">
    <div class="flex justify-between items-end mb-8 border-b border-gray-100 pb-4">
      <h2 class="text-xl font-bold uppercase tracking-widest">Latest Collection</h2>
    </div>
    <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-x-8 md:gap-y-12">
      <p class="col-span-full text-center text-gray-400 py-20 uppercase tracking-widest text-sm animate-pulse">Loading products...</p>
    </div>
  </main>

  <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'bg-black text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl animate-slide-up flex items-center gap-2';
      toast.innerHTML = `<span>✓</span> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function updateCartCount() {
      document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
    }

    async function loadActiveBanners() {
      const { data } = await supabase.from('banners').select('*').eq('active', 1).order('created_at', { ascending: false }).limit(1);
      if (data && data.length > 0) {
        const b = data[0];
        const section = document.getElementById('banner-section');
        section.innerHTML = `
          <div class="w-full h-64 md:h-80 bg-gray-100 bg-cover bg-center flex items-end p-8 relative overflow-hidden group" style="background-image: url('${b.image_url}')">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            <div class="relative z-10 text-white transform transition-transform duration-500 group-hover:translate-y-[-5px]">
              <h2 class="text-3xl md:text-4xl font-bold mb-1 tracking-tight">${b.title || ''}</h2>
              <p class="text-sm font-light uppercase tracking-widest opacity-80">${b.subtitle || ''}</p>
            </div>
          </div>`;
        section.classList.remove('hidden');
        setTimeout(() => section.classList.remove('opacity-0'), 50);
      }
    }

    async function loadProducts() {
      const { data: products, error } = await supabase.from('products').select('*').eq('status', 'Active').order('created_at', { ascending: false });
      const grid = document.getElementById('products-grid');
      if (error) { grid.innerHTML = `<p class="col-span-full text-center text-red-500">Error loading products.</p>`; return; }
      if (!products.length) { grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-10 uppercase tracking-widest text-sm">No products available.</p>`; return; }

      grid.innerHTML = products.map(p => {
        const outOfStock = p.stock <= 0;
        const imgUrl = p.image_url || 'https://via.placeholder.com/600?text=No+Image';
        return `
          <div class="group flex flex-col">
            <a href="/product?id=${p.product_id}" class="block aspect-[4/5] bg-gray-50 relative overflow-hidden mb-4">
              <img src="${imgUrl}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-700 ease-in-out group-hover:scale-105">
              ${outOfStock ? `<div class="absolute inset-0 bg-white/60 backdrop-blur-sm flex items-center justify-center"><span class="text-black font-bold text-sm uppercase tracking-widest border-2 border-black px-4 py-2 bg-white">Out of Stock</span></div>` : ''}
              ${p.stock > 0 && p.stock <= 5 ? `<span class="absolute top-3 left-3 bg-black text-white text-[10px] uppercase font-bold tracking-widest px-2 py-1">Only ${p.stock} left</span>` : ''}
            </a>
            <div class="flex flex-col flex-grow">
              <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">${p.category || 'General'}</p>
              <a href="/product?id=${p.product_id}" class="font-medium text-black leading-snug mb-2 hover:underline underline-offset-4 decoration-1">${p.name}</a>
              <div class="mt-auto flex items-center justify-between pt-3">
                <span class="text-sm font-semibold">RM ${parseFloat(p.price).toFixed(2)}</span>
                <button onclick="addToCart('${p.product_id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, ${p.stock})"
                  class="text-xs font-bold uppercase tracking-widest border-b border-black pb-0.5 transition-all hover:text-gray-500 hover:border-gray-500 disabled:opacity-30 disabled:border-transparent disabled:cursor-not-allowed"
                  ${outOfStock ? 'disabled' : ''}>
                  ${outOfStock ? 'Sold' : 'Add'}
                </button>
              </div>
            </div>
          </div>`;
      }).join('');
      setTimeout(() => document.querySelector('main').classList.remove('opacity-0'), 50);
    }

    function addToCart(id, name, price, maxStock) {
      const existing = cart.find(item => item.id === id);
      if (existing) {
        if (existing.qty >= maxStock) { showToast(`Only ${maxStock} in stock.`); return; }
        existing.qty += 1;
      } else {
        if (maxStock < 1) { showToast('Out of stock.'); return; }
        cart.push({ id, name, price, qty: 1 });
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      showToast('Added to cart');
    }

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location.href = '/login'; return; }
      updateCartCount();
      loadActiveBanners();
      loadProducts();
    }

    // Fungsi asal
    async function logout() { await supabase.auth.signOut(); window.location.href = '/index.html'; }

    // Fungsi baru dari snippet Claude
    async function signOut() {
      await supabase.auth.signOut();
      window.location.href = '/login';
    }

    checkAuth();
  </script>
</body>
</html>
