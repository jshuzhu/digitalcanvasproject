<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Successful • DigitalCanvasMy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } } }
  </script>
</head>
<body class="bg-white text-black min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full text-center animate-fade-in-up">
    <div class="mb-8">
      <svg class="w-20 h-20 mx-auto text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>

    <h1 class="text-4xl font-bold tracking-tight mb-4">Order Received</h1>
    <p class="text-gray-500 mb-8 font-light leading-relaxed">
      Thank you for choosing DigitalCanvasMy. Your order has been successfully placed and we are already preparing your items.
    </p>

    <div class="flex flex-col gap-3">
      <a href="/orders" class="w-full bg-black text-white py-4 font-bold uppercase tracking-widest text-sm hover:bg-gray-800 transition-all">
        View My Orders
      </a>
      <a href="/shop" class="w-full bg-gray-100 text-black py-4 font-bold uppercase tracking-widest text-sm hover:bg-gray-200 transition-all">
        Continue Shopping
      </a>
    </div>
  </div>

  <style>
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
  </style>
</body>
</html>
